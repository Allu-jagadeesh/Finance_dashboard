<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->

  <link href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  
  <!-- Custom CSS -->

  <link rel="stylesheet" href="finance.css">

  <!-- Chart.js -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="container-fluid">
  <div class="row">


<!-- Sidebar -->
<div class="col-md-2 sidebar p-3">
  <nav>FD</nav>
  <ul class="menu">
    <li><a href="financedashboard.html"><i class="bi bi-house-dash" style="color: aqua;"></i>Dashboard</a></li>
    <li><a href=""><i class="bi bi-bank" style="color: aqua;"> </i>Transactions</a></li>
    <li><a href=""><i class="bi bi-journals" style="color: aqua;"></i>Insights</a></li>
    <li><a href="#" id="settingsLink"><i class="bi bi-gear" style="color: aqua;"></i>Settings</a></li>
  </ul>

  
    <label class="mt-3">Role:</label>
    <select id="roleSelect" class="form-select">
      <option value="viewer">Viewer</option>
      <option value="admin">Admin</option>
    </select>


</div>

<!-- Main Content -->
<div class="col-md-10 p-4 ">

  <h2>Finance Dashboard</h2>

  <!-- Summary Cards -->
  <div class="row mt-3">
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Total Balance <i class="bi bi-wallet" style="color: rgb(244, 242, 244); border-radius:55px; border: 10px; background-color: darkorange; padding: 5px; margin-left: 196px;"></i></h5>
        <h3 id="balance">₹0</h3>
        
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Income <i class="bi bi-currency-rupee" style="color: rgb(244, 242, 244); border-radius:55px; border: 10px; background-color: rgb(6, 143, 31); padding: 6px; margin-left: 245px;"></i></h5>
        <h3 id="income">₹0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h5>Expenses <i class="bi bi-cash-coin" style="color: rgb(244, 242, 244); border-radius:55px; border: 10px; background-color: rgb(159, 7, 7); padding: 6px; margin-left: 230px;"></i></h5>
        <h3 id="expenses">₹0</h3>
      </div>
    </div>
  </div>

  <!-- Charts -->
  <div class="row mt-4">
    <div class="col-md-6">
      <canvas id="trendChart"></canvas>
    </div>
    <div class="chart col-md-6">
      <canvas id="categoryChart"></canvas>
    </div>
  </div>

  <!-- Transactions -->
  <div class="mt-5">
    <h4>Transactions</h4>

    <input type="text" id="search" class="form-control mb-2" placeholder="Search...">

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="transactionTable"></tbody>
    </table>
    <button class="btn btn-danger mt-2" onclick="clearAllData()">
  Clear data
</button>
  </div>

  <!-- Add Transaction (Admin Only) -->
  <div id="adminPanel" class="mt-4 d-none">
    <h5>Add Transaction</h5>
    <input type="text" id="category" placeholder="Category" class="form-control mb-2">
    <input type="number" id="amount" placeholder="Amount" class="form-control mb-2">
    <select id="type" class="form-control mb-2">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button type="button" class="btn btn-primary" onclick="addTransaction()">Add</button>
  </div>

  <!-- Insights -->
  <div class="mt-5">
    <h4>Insights</h4>
    <p id="insights"></p>
  </div>

</div>


  </div>
</div>

<script src="finance.js"></script>

</body>
</html>
